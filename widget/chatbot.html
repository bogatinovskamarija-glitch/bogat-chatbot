<!-- Bogat Architecture — Lumen AI Chat Widget -->
<!-- Paste this entire block into Webflow: Site Settings > Custom Code > Before </body> tag -->

<style>
  /* ── Brand tokens ──────────────────────────────────────── */
  :root {
    --lumen-green:      #242E22;
    --lumen-green-mid:  #2e3b2b;
    --lumen-green-soft: #354132;
    --lumen-gold:       #C9A84C;
    --lumen-gold-dim:   rgba(201,168,76,0.18);
    --lumen-gold-glow:  rgba(201,168,76,0.35);
    --lumen-bg:         #1a1f19;
    --lumen-msg-bg:     #232920;
    --lumen-text:       #e8e4d8;
    --lumen-muted:      rgba(232,228,216,0.45);
  }

  /* ── Bubble button ─────────────────────────────────────── */
  #bogat-chat-bubble {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 9999;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: var(--lumen-green);
    border: 1.5px solid rgba(201,168,76,0.4);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 0 0 var(--lumen-gold-glow),
      0 6px 24px rgba(0,0,0,0.45);
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s;
    outline: none;
    animation: lumen-pulse 3s ease-in-out infinite;
  }
  @keyframes lumen-pulse {
    0%, 100% { box-shadow: 0 0 0 0 var(--lumen-gold-glow), 0 6px 24px rgba(0,0,0,0.45); }
    50%       { box-shadow: 0 0 0 8px rgba(201,168,76,0), 0 6px 24px rgba(0,0,0,0.45); }
  }
  #bogat-chat-bubble:hover {
    transform: scale(1.08);
    border-color: var(--lumen-gold);
    box-shadow: 0 0 20px var(--lumen-gold-glow), 0 8px 30px rgba(0,0,0,0.5);
    animation: none;
  }
  #bogat-chat-bubble.open {
    animation: none;
    border-color: var(--lumen-gold);
    box-shadow: 0 0 16px var(--lumen-gold-glow), 0 6px 24px rgba(0,0,0,0.45);
  }
  #bogat-chat-bubble svg {
    width: 22px;
    height: 22px;
    fill: var(--lumen-gold);
    transition: opacity 0.15s;
  }
  #bogat-chat-bubble .bogat-close-icon { display: none; fill: var(--lumen-muted); }
  #bogat-chat-bubble.open .bogat-chat-icon  { display: none; }
  #bogat-chat-bubble.open .bogat-close-icon { display: block; }

  /* ── Chat window ───────────────────────────────────────── */
  #bogat-chat-window {
    position: fixed;
    bottom: 98px;
    right: 28px;
    z-index: 9998;
    width: 368px;
    max-width: calc(100vw - 36px);
    height: 540px;
    max-height: calc(100vh - 120px);
    background: var(--lumen-bg);
    border-radius: 18px;
    border: 1px solid rgba(201,168,76,0.2);
    box-shadow:
      0 0 0 1px rgba(201,168,76,0.06),
      0 24px 60px rgba(0,0,0,0.6),
      0 0 40px rgba(0,0,0,0.3);
    display: none;
    flex-direction: column;
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 14px;
    color: var(--lumen-text);
  }
  #bogat-chat-window.visible {
    display: flex;
    animation: lumen-reveal 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes lumen-reveal {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Header ────────────────────────────────────────────── */
  .bogat-chat-header {
    background: var(--lumen-green);
    padding: 0;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  /* Gold accent line at top */
  .bogat-chat-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--lumen-gold), transparent);
  }
  .bogat-header-inner {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px 13px;
  }
  /* Lumen avatar — glowing L */
  .bogat-lumen-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--lumen-green-soft);
    border: 1.5px solid rgba(201,168,76,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
    font-weight: 700;
    color: var(--lumen-gold);
    letter-spacing: 0;
    box-shadow: 0 0 10px rgba(201,168,76,0.2);
  }
  .bogat-header-text {
    flex: 1;
  }
  .bogat-header-text strong {
    display: block;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--lumen-text);
    letter-spacing: 0.02em;
  }
  .bogat-header-status {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }
  .bogat-status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #6fcf97;
    box-shadow: 0 0 6px rgba(111,207,151,0.8);
    animation: lumen-status-blink 2.5s ease-in-out infinite;
  }
  @keyframes lumen-status-blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }
  .bogat-header-status span {
    font-size: 11px;
    color: var(--lumen-muted);
    letter-spacing: 0.01em;
  }

  /* ── Messages area ─────────────────────────────────────── */
  .bogat-chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
    background: var(--lumen-bg);
  }
  .bogat-chat-messages::-webkit-scrollbar { width: 3px; }
  .bogat-chat-messages::-webkit-scrollbar-track { background: transparent; }
  .bogat-chat-messages::-webkit-scrollbar-thumb {
    background: rgba(201,168,76,0.2);
    border-radius: 2px;
  }

  /* ── Message bubbles ───────────────────────────────────── */
  .bogat-msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .bogat-msg-row.user { flex-direction: row-reverse; }

  /* Bot avatar dot */
  .bogat-msg-avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--lumen-green-soft);
    border: 1px solid rgba(201,168,76,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--lumen-gold);
    flex-shrink: 0;
    margin-bottom: 2px;
  }
  .bogat-msg-row.user .bogat-msg-avatar { display: none; }

  .bogat-msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.55;
    word-break: break-word;
    white-space: pre-wrap;
    font-size: 13.5px;
  }
  .bogat-msg.bot {
    background: var(--lumen-msg-bg);
    color: var(--lumen-text);
    border: 1px solid rgba(201,168,76,0.1);
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .bogat-msg.user {
    background: linear-gradient(135deg, #C9A84C, #b5923e);
    color: #1a1a0e;
    font-weight: 500;
    border-bottom-right-radius: 4px;
    align-self: flex-end;
    box-shadow: 0 2px 16px rgba(201,168,76,0.25);
  }

  /* ── Typing indicator ──────────────────────────────────── */
  .bogat-typing-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .bogat-typing {
    padding: 12px 16px;
    background: var(--lumen-msg-bg);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 5px;
    align-items: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .bogat-typing span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--lumen-gold);
    animation: lumen-bounce 1.3s ease-in-out infinite;
    opacity: 0.6;
  }
  .bogat-typing span:nth-child(2) { animation-delay: 0.18s; }
  .bogat-typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes lumen-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Input row ─────────────────────────────────────────── */
  .bogat-chat-input-row {
    display: flex;
    gap: 8px;
    padding: 12px 12px 14px;
    border-top: 1px solid rgba(201,168,76,0.1);
    flex-shrink: 0;
    background: var(--lumen-green);
  }
  .bogat-chat-input {
    flex: 1;
    background: var(--lumen-green-soft);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    padding: 9px 13px;
    font-size: 13.5px;
    font-family: inherit;
    color: var(--lumen-text);
    outline: none;
    resize: none;
    max-height: 96px;
    overflow-y: auto;
    line-height: 1.45;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: var(--lumen-gold);
  }
  .bogat-chat-input:focus {
    border-color: rgba(201,168,76,0.55);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
  }
  .bogat-chat-input::placeholder { color: var(--lumen-muted); }
  .bogat-chat-input::-webkit-scrollbar { width: 3px; }
  .bogat-chat-input::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); }

  .bogat-chat-send {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--lumen-gold);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    align-self: flex-end;
  }
  .bogat-chat-send:hover {
    background: #d4b05a;
    box-shadow: 0 0 14px rgba(201,168,76,0.4);
    transform: scale(1.05);
  }
  .bogat-chat-send:active { transform: scale(0.97); }
  .bogat-chat-send:disabled {
    background: var(--lumen-green-soft);
    border: 1px solid rgba(201,168,76,0.15);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }
  .bogat-chat-send svg { width: 15px; height: 15px; fill: var(--lumen-green); }
  .bogat-chat-send:disabled svg { fill: var(--lumen-muted); }

  /* ── Lead captured banner ──────────────────────────────── */
  .bogat-lead-banner {
    margin: 0 12px 10px;
    padding: 10px 14px;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 10px;
    font-size: 12px;
    color: var(--lumen-gold);
    display: none;
    letter-spacing: 0.01em;
  }

  /* ── Powered by footer ─────────────────────────────────── */
  .bogat-powered {
    text-align: center;
    padding: 6px 0 8px;
    font-size: 10px;
    color: rgba(201,168,76,0.3);
    letter-spacing: 0.04em;
    background: var(--lumen-green);
    text-transform: uppercase;
  }
</style>

<!-- ── Bubble button ───────────────────────────────────────── -->
<button id="bogat-chat-bubble" aria-label="Open Lumen chat">
  <svg class="bogat-chat-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2C6.477 2 2 6.149 2 11.25c0 2.547 1.11 4.84 2.9 6.482V21l3.742-2.04A11.3 11.3 0 0 0 12 19.5c5.523 0 10-4.149 10-9.25S17.523 2 12 2Z"/>
  </svg>
  <svg class="bogat-close-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  </svg>
</button>

<!-- ── Chat window ─────────────────────────────────────────── -->
<div id="bogat-chat-window" role="dialog" aria-label="Lumen — Bogat Architecture AI">
  <!-- Header -->
  <div class="bogat-chat-header">
    <div class="bogat-header-inner">
      <div class="bogat-lumen-avatar">L</div>
      <div class="bogat-header-text">
        <strong>Lumen · Bogat Architecture</strong>
        <div class="bogat-header-status">
          <div class="bogat-status-dot"></div>
          <span>Online · Available 24/7</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div class="bogat-chat-messages" id="bogat-messages"></div>

  <!-- Lead captured banner -->
  <div class="bogat-lead-banner" id="bogat-lead-banner">
    ✦ Your info is with Maria. Expect to hear from her within 24 hours.
  </div>

  <!-- Input -->
  <div class="bogat-chat-input-row">
    <textarea
      class="bogat-chat-input"
      id="bogat-input"
      placeholder="Ask about the firm, Maria's work, or your project…"
      rows="1"
      aria-label="Message Lumen"
    ></textarea>
    <button class="bogat-chat-send" id="bogat-send" aria-label="Send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 2 11 13M22 2 15 22l-4-9-9-4 20-7Z"/>
      </svg>
    </button>
  </div>

  <div class="bogat-powered">Lumen AI · Bogat Architecture & Design</div>
</div>

<script>
(function () {
  // ── Config ──────────────────────────────────────────────────
  const API_URL = 'https://bogat-chatbot.onrender.com/api/chat';
  const GREETING = "Hey, welcome to Bogat Architecture. I'm Lumen — I can answer questions about the firm, Maria's work, or anything you're building. What brings you here today?";
  // ───────────────────────────────────────────────────────────

  const bubble   = document.getElementById('bogat-chat-bubble');
  const chatWin  = document.getElementById('bogat-chat-window');
  const msgList  = document.getElementById('bogat-messages');
  const input    = document.getElementById('bogat-input');
  const sendBtn  = document.getElementById('bogat-send');
  const banner   = document.getElementById('bogat-lead-banner');

  let messages    = [];
  let isStreaming = false;
  let opened      = false;

  // ── Toggle ───────────────────────────────────────────────────
  bubble.addEventListener('click', () => {
    const isOpen = chatWin.classList.toggle('visible');
    bubble.classList.toggle('open', isOpen);
    if (isOpen && !opened) {
      opened = true;
      appendBotMessage(GREETING);
    }
    if (isOpen) setTimeout(() => input.focus(), 50);
  });

  // ── Auto-resize textarea ─────────────────────────────────────
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 96) + 'px';
  });

  // ── Send on Enter ────────────────────────────────────────────
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener('click', sendMessage);

  // ── Append bot message (with avatar) ────────────────────────
  function appendBotMessage(text) {
    const row = document.createElement('div');
    row.className = 'bogat-msg-row';

    const avatar = document.createElement('div');
    avatar.className = 'bogat-msg-avatar';
    avatar.textContent = 'L';

    const bubble_ = document.createElement('div');
    bubble_.className = 'bogat-msg bot';
    bubble_.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble_);
    msgList.appendChild(row);
    scrollToBottom();
    return bubble_;
  }

  // ── Append user message ──────────────────────────────────────
  function appendUserMessage(text) {
    const row = document.createElement('div');
    row.className = 'bogat-msg-row user';

    const bubble_ = document.createElement('div');
    bubble_.className = 'bogat-msg user';
    bubble_.textContent = text;

    row.appendChild(bubble_);
    msgList.appendChild(row);
    scrollToBottom();
  }

  // ── Typing indicator ─────────────────────────────────────────
  function showTyping() {
    const row = document.createElement('div');
    row.className = 'bogat-typing-row';
    row.id = 'bogat-typing-row';

    const avatar = document.createElement('div');
    avatar.className = 'bogat-msg-avatar';
    avatar.textContent = 'L';

    const el = document.createElement('div');
    el.className = 'bogat-typing';
    el.innerHTML = '<span></span><span></span><span></span>';

    row.appendChild(avatar);
    row.appendChild(el);
    msgList.appendChild(row);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('bogat-typing-row');
    if (el) el.remove();
  }

  function scrollToBottom() {
    msgList.scrollTop = msgList.scrollHeight;
  }

  // ── Send message ─────────────────────────────────────────────
  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isStreaming) return;

    input.value = '';
    input.style.height = 'auto';
    isStreaming = true;
    sendBtn.disabled = true;

    appendUserMessage(text);
    messages.push({ role: 'user', content: text });
    showTyping();

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages }),
      });

      if (!response.ok) throw new Error('Server error ' + response.status);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let botBubble = null;
      let botText = '';
      let typingRemoved = false;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let parsed;
          try { parsed = JSON.parse(line.slice(6)); } catch { continue; }

          if (parsed.text !== undefined) {
            if (!typingRemoved) { hideTyping(); typingRemoved = true; }
            if (!botBubble) botBubble = appendBotMessage('');
            botText += parsed.text;
            botBubble.textContent = botText;
            scrollToBottom();
          }

          if (parsed.captured || parsed.lead_captured) {
            banner.style.display = 'block';
          }

          if (parsed.done) {
            messages.push({ role: 'assistant', content: botText });
          }
        }
      }
    } catch (err) {
      hideTyping();
      appendBotMessage('Something went wrong on my end. Try again in a moment.');
      console.error('Lumen error:', err);
    }

    isStreaming = false;
    sendBtn.disabled = false;
    input.focus();
  }
})();
</script>
