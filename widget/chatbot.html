<!-- Bogat Architecture AI Chatbot Widget -->
<!-- Paste this entire block into Webflow: Pages > Before </body> tag (or Embed element) -->

<style>
  /* ──────────────────────────────────────────
     Chat Bubble Button
  ────────────────────────────────────────── */
  #bogat-chat-bubble {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 9999;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #1a1a1a;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    outline: none;
  }
  #bogat-chat-bubble:hover {
    transform: scale(1.07);
    box-shadow: 0 6px 28px rgba(0,0,0,0.32);
  }
  #bogat-chat-bubble svg {
    width: 24px;
    height: 24px;
    fill: #fff;
  }
  #bogat-chat-bubble .bogat-close-icon { display: none; }
  #bogat-chat-bubble.open .bogat-chat-icon { display: none; }
  #bogat-chat-bubble.open .bogat-close-icon { display: block; }

  /* ──────────────────────────────────────────
     Chat Window
  ────────────────────────────────────────── */
  #bogat-chat-window {
    position: fixed;
    bottom: 96px;
    right: 28px;
    z-index: 9998;
    width: 360px;
    max-width: calc(100vw - 40px);
    height: 520px;
    max-height: calc(100vh - 120px);
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    display: none;
    flex-direction: column;
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 14px;
    color: #1a1a1a;
  }
  #bogat-chat-window.visible {
    display: flex;
    animation: bogat-slide-up 0.25s ease;
  }
  @keyframes bogat-slide-up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .bogat-chat-header {
    background: #1a1a1a;
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .bogat-chat-header-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #6fcf97;
    flex-shrink: 0;
  }
  .bogat-chat-header-text strong {
    display: block;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .bogat-chat-header-text span {
    font-size: 11px;
    opacity: 0.65;
    letter-spacing: 0.01em;
  }

  /* Messages area */
  .bogat-chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .bogat-chat-messages::-webkit-scrollbar { width: 4px; }
  .bogat-chat-messages::-webkit-scrollbar-track { background: transparent; }
  .bogat-chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

  /* Message bubbles */
  .bogat-msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .bogat-msg.bot {
    background: #f4f4f4;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .bogat-msg.user {
    background: #1a1a1a;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  /* Typing indicator */
  .bogat-typing {
    align-self: flex-start;
    padding: 10px 14px;
    background: #f4f4f4;
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .bogat-typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #999;
    animation: bogat-bounce 1.2s infinite;
  }
  .bogat-typing span:nth-child(2) { animation-delay: 0.2s; }
  .bogat-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bogat-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* Input row */
  .bogat-chat-input-row {
    display: flex;
    gap: 8px;
    padding: 12px 14px;
    border-top: 1px solid #ebebeb;
    flex-shrink: 0;
    background: #fff;
  }
  .bogat-chat-input {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    color: #1a1a1a;
    outline: none;
    resize: none;
    max-height: 100px;
    overflow-y: auto;
    line-height: 1.4;
    transition: border-color 0.15s;
  }
  .bogat-chat-input:focus { border-color: #1a1a1a; }
  .bogat-chat-input::placeholder { color: #aaa; }
  .bogat-chat-send {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    background: #1a1a1a;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
    align-self: flex-end;
  }
  .bogat-chat-send:hover { background: #333; }
  .bogat-chat-send:disabled { background: #ccc; cursor: not-allowed; }
  .bogat-chat-send svg { width: 16px; height: 16px; fill: #fff; }

  /* Lead captured confirmation */
  .bogat-lead-banner {
    margin: 0 16px 12px;
    padding: 10px 14px;
    background: #f0faf4;
    border: 1px solid #b2e4c5;
    border-radius: 8px;
    font-size: 12px;
    color: #1e7a45;
    display: none;
  }
</style>

<!-- Chat bubble button -->
<button id="bogat-chat-bubble" aria-label="Open chat">
  <!-- Chat icon -->
  <svg class="bogat-chat-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2C6.477 2 2 6.149 2 11.25c0 2.547 1.11 4.84 2.9 6.482V21l3.742-2.04A11.3 11.3 0 0 0 12 19.5c5.523 0 10-4.149 10-9.25S17.523 2 12 2Z"/>
  </svg>
  <!-- Close icon -->
  <svg class="bogat-close-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M18 6 6 18M6 6l12 12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </svg>
</button>

<!-- Chat window -->
<div id="bogat-chat-window" role="dialog" aria-label="Bogat Architecture chat">
  <div class="bogat-chat-header">
    <div class="bogat-chat-header-dot"></div>
    <div class="bogat-chat-header-text">
      <strong>Bogat Architecture</strong>
      <span>AI Assistant · Usually replies instantly</span>
    </div>
  </div>

  <div class="bogat-chat-messages" id="bogat-messages"></div>

  <div class="bogat-lead-banner" id="bogat-lead-banner">
    ✓ Your information has been received. We'll be in touch soon!
  </div>

  <div class="bogat-chat-input-row">
    <textarea
      class="bogat-chat-input"
      id="bogat-input"
      placeholder="Ask about our work, services, or start a project…"
      rows="1"
      aria-label="Chat message"
    ></textarea>
    <button class="bogat-chat-send" id="bogat-send" aria-label="Send message">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 2 11 13M22 2 15 22l-4-9-9-4 20-7Z"/>
      </svg>
    </button>
  </div>
</div>

<script>
(function () {
  // ── Configuration ──────────────────────────────────────────────
  const API_URL = 'https://bogat-chatbot.onrender.com/api/chat'; // update after deploy
  const GREETING = "Hi! I'm the AI assistant for Bogat Architecture & Design. How can I help you today? Whether you have questions about our work or you're thinking about starting a project, I'm here.";
  // ──────────────────────────────────────────────────────────────

  const bubble  = document.getElementById('bogat-chat-bubble');
  const window_ = document.getElementById('bogat-chat-window');
  const msgList = document.getElementById('bogat-messages');
  const input   = document.getElementById('bogat-input');
  const sendBtn = document.getElementById('bogat-send');
  const banner  = document.getElementById('bogat-lead-banner');

  let messages = []; // conversation history
  let isStreaming = false;
  let opened = false;

  // ── Toggle window ──────────────────────────────────────────────
  bubble.addEventListener('click', () => {
    const isOpen = window_.classList.toggle('visible');
    bubble.classList.toggle('open', isOpen);

    if (isOpen && !opened) {
      opened = true;
      appendMessage('bot', GREETING);
    }
    if (isOpen) input.focus();
  });

  // ── Auto-resize textarea ───────────────────────────────────────
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  });

  // ── Send on Enter (Shift+Enter = newline) ──────────────────────
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  // ── Append a message bubble ────────────────────────────────────
  function appendMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'bogat-msg ' + role;
    div.textContent = text;
    msgList.appendChild(div);
    scrollToBottom();
    return div;
  }

  // ── Typing indicator ───────────────────────────────────────────
  function showTyping() {
    const el = document.createElement('div');
    el.className = 'bogat-typing';
    el.id = 'bogat-typing';
    el.innerHTML = '<span></span><span></span><span></span>';
    msgList.appendChild(el);
    scrollToBottom();
    return el;
  }

  function hideTyping() {
    const el = document.getElementById('bogat-typing');
    if (el) el.remove();
  }

  function scrollToBottom() {
    msgList.scrollTop = msgList.scrollHeight;
  }

  // ── Send a message ─────────────────────────────────────────────
  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isStreaming) return;

    input.value = '';
    input.style.height = 'auto';
    isStreaming = true;
    sendBtn.disabled = true;

    appendMessage('user', text);
    messages.push({ role: 'user', content: text });

    const typingEl = showTyping();

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages }),
      });

      if (!response.ok) throw new Error('Server error ' + response.status);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let botBubble = null;
      let botText = '';
      let typingRemoved = false;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (line.startsWith('event: ')) continue; // handled via data
          if (!line.startsWith('data: ')) continue;

          let parsed;
          try { parsed = JSON.parse(line.slice(6)); } catch { continue; }

          if (parsed.text !== undefined) {
            if (!typingRemoved) { hideTyping(); typingRemoved = true; }
            if (!botBubble) botBubble = appendMessage('bot', '');
            botText += parsed.text;
            botBubble.textContent = botText;
            scrollToBottom();
          }

          if (parsed.lead_captured || parsed.captured) {
            banner.style.display = 'block';
          }

          if (parsed.done) {
            messages.push({ role: 'assistant', content: botText });
          }
        }
      }
    } catch (err) {
      hideTyping();
      appendMessage('bot', 'Sorry, something went wrong. Please try again in a moment.');
      console.error('Chat error:', err);
    }

    isStreaming = false;
    sendBtn.disabled = false;
    input.focus();
  }
})();
</script>
